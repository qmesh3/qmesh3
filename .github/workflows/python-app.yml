# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: qgis/qgis:release-3_34
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Environment
        run: |
          # These paths are standard for the official QGIS Docker image
          echo "PYTHONPATH=$PYTHONPATH:/usr/share/qgis/python" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/lib" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          # xvfb-run is usually pre-installed in the QGIS image
          # it provides a virtual display for the QGIS/Qt engine
          xvfb-run pytest
